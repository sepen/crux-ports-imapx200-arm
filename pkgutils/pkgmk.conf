#
# /etc/pkgmk.conf: pkgmk(8) configuration
#

# imapx200 flags
export CFLAGS="-O2 -pipe -march=armv6 -mfloat-abi=hard -mfpu=vfp"
export CXXFLAGS="${CFLAGS}"

# export JOBS=$(nproc)
# export MAKEFLAGS="-j $JOBS"

# Go defaults to GOARM=7 (assumes VFPv3), but this board's ARM1136/VFP11
# core only has VFPv2 -- a GOARM=7 binary crashes with SIGILL at runtime.
# GOARM=6 matches this CPU (ARMv6 + VFPv1/VFPv2).
export GOOS=linux
export GOARCH=arm
export GOARM=6

# PKGMK_SOURCE_MIRRORS=()
# PKGMK_SOURCE_DIR="$PWD"
# PKGMK_PACKAGE_DIR="$PWD"
# PKGMK_WORK_DIR="$PWD/work"
# PKGMK_DOWNLOAD="no"
# PKGMK_IGNORE_SIGNATURE="no"
# PKGMK_IGNORE_MD5SUM="no"
# PKGMK_IGNORE_FOOTPRINT="no"
# PKGMK_IGNORE_NEW="yes"
# PKGMK_NO_STRIP="no"
# PKGMK_DOWNLOAD_PROG="curl"
# PKGMK_WGET_OPTS=""
# PKGMK_CURL_OPTS=""
# PKGMK_COMPRESSION_MODE="gz"

# End of file
